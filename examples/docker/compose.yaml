services:
  gpu-exporter:
    image: gpu-exporter:0.4.0-cuda12
    build:
      context: ../..
      dockerfile: examples/docker/Dockerfile
      args:
        # 12 для хостов с CUDA 12.x, 13 для хостов с CUDA 13.x.
        DCGM_CUDA_MAJOR: "12"
    restart: unless-stopped
    ports:
      - "127.0.0.1:9990:9990"

    # Нужен только для профилирующих метрик (gpu_prof_*).
    cap_add:
      - SYS_ADMIN

    runtime: nvidia

    environment:
      GPU_EXPORTER_LOG_LEVEL: info
      #GPU_EXPORTER_SCRAPE_INTERVAL: 100ms
      #GPU_EXPORTER_ACTIVE_THRESHOLD: "1.0"
      #GPU_EXPORTER_MIN_REQUEST_TIME: 50ms
